<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Booking Successful</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link
rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>

body{
    background:#f5f7fb;
}

.ticket-card{

    border:none;

    border-radius:25px;

    overflow:hidden;
}

.ticket-header{

    background:linear-gradient(
        90deg,
        #0d6efd,
        #003399
    );

    color:white;

    padding:25px;
}

.ticket-body{

    padding:30px;
}

.info-box{

    background:#f8f9fa;

    padding:15px;

    border-radius:12px;

    margin-bottom:15px;
}

.pass-id{

    font-size:1.2rem;

    font-weight:bold;
}

</style>

</head>

<body>

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-6">

            <div class="card shadow ticket-card">

                <div class="ticket-header text-center">

                    <i class="bi bi-check-circle-fill fs-1"></i>

                    <h2 class="mt-3">

                        Booking Successful

                    </h2>

                </div>

                <div class="ticket-body">

                    <div class="info-box">

                        <div class="text-muted">

                            Pass ID

                        </div>

                        <div class="pass-id text-primary">

                            {{ pass_id }}

                        </div>

                    </div>

                    <div class="info-box">

                        <div class="text-muted">

                            Passenger Name

                        </div>

                        <div>

                            {{ name }}

                        </div>

                    </div>

                    <div class="info-box">

                        <div class="text-muted">

                            Route

                        </div>

                        <div>

                            {{ route }}

                        </div>

                    </div>

                    <div class="info-box">

                        <div class="text-muted">

                            Ticket Price

                        </div>

                        <div class="text-success fw-bold">

                            ₹{{ price }}

                        </div>

                    </div>

                    <div class="d-grid gap-2 mt-4">

                        <a
                        href="/search"
                        class="btn btn-primary">

                        Search This Pass Later

                        </a>

                        <a
                        href="/"
                        class="btn btn-outline-secondary">

                        Back Home

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
