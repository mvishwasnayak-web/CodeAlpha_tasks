<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Search Pass</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link
rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>

body{
    background:#f5f7fb;
}

.search-card{
    border:none;
    border-radius:25px;
}

</style>

</head>

<body>

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-6">

            <div class="card search-card shadow">

                <div class="card-body p-5">

                    <h1 class="text-center mb-4">

                        <i class="bi bi-search text-primary"></i>

                        Search Bus Pass

                    </h1>

                    <form method="POST">

                        <div class="input-group">

                            <input
                            type="text"
                            name="pass_id"
                            class="form-control"
                            placeholder="Enter Pass ID"
                            required>

                            <button
                            class="btn btn-primary">

                            Search

                            </button>

                        </div>

                    </form>

                    {% if booking %}

                    <div
                    class="card mt-4 border-success">

                        <div class="card-body">

                            <h4 class="text-success">

                                Pass Found

                            </h4>

                            <hr>

                            <p>

                                <strong>Pass ID:</strong>

                                {{ booking.pass_id }}

                            </p>

                            <p>

                                <strong>Name:</strong>

                                {{ booking.name }}

                            </p>

                            <p>

                                <strong>Route:</strong>

                                {{ booking.route }}

                            </p>

                            <p>

                                <strong>Price:</strong>

                                ₹{{ booking.price }}

                            </p>

                        </div>

                    </div>

                    {% elif searched %}

                    <div
                    class="alert alert-danger mt-4">

                        No Pass Found

                    </div>

                    {% endif %}

                    <div class="text-center mt-4">

                        <a
                        href="/"
                        class="btn btn-outline-primary">

                        Back Home

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
