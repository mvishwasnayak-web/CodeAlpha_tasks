<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Book Pass</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link
rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>

body{
    background:#f5f7fb;
}

.booking-card{
    border:none;
    border-radius:25px;
}

</style>

</head>

<body>

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-6">

            <div class="card booking-card shadow">

                <div class="card-body p-5">

                    <h1 class="text-center mb-4">

                        <i class="bi bi-ticket-perforated text-success"></i>

                        Book Bus Pass

                    </h1>

                    <form
                    action="/book-pass"
                    method="POST">

                        <div class="mb-3">

                            <label class="form-label">

                                Passenger Name

                            </label>

                            <input
                            type="text"
                            name="passenger_name"
                            class="form-control"
                            required>

                        </div>

                        <div class="mb-4">

                            <label class="form-label">

                                Select Route

                            </label>

                            <select
                            name="route"
                            class="form-select">

                                <option value="Mangalore-Ujire">

                                    Mangalore → Ujire (₹80)

                                </option>

                                <option value="Mangalore-Dharmasthala">

                                    Mangalore → Dharmasthala (₹120)

                                </option>

                                <option value="Mangalore-Belthangady">

                                    Mangalore → Belthangady (₹100)

                                </option>

                            </select>

                        </div>

                        <button
                        class="btn btn-success w-100">

                        Book Pass

                        </button>

                    </form>

                    <div class="text-center mt-4">

                        <a
                        href="/"
                        class="btn btn-outline-primary">

                        Back Home

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
